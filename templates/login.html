{% extends "base.html" %}
{% block content %}
<div class="container animate-fade-in w-100">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="glass-card p-5 mt-5 rounded-4 border-0 shadow-lg">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-sun fa-3x text-warning mb-3"></i>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to access your dashboard</p>
                </div>

                <form method="POST" action="/login">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control bg-transparent" id="email" name="email" placeholder="name@example.com" required>
                        <label for="email" class="text-muted"><i class="fa-solid fa-envelope me-2"></i>Email address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control bg-transparent" id="password" name="password" placeholder="Password" required>
                        <label for="password" class="text-muted"><i class="fa-solid fa-lock me-2"></i>Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold text-white fs-5 hover-shadow">
                        Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Don't have an account?</span> 
                    <a href="/register" class="text-primary fw-semibold text-decoration-none ms-1">Sign up</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
